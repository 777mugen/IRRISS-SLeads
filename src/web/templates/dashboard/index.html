{% extends "base.html" %}

{% block title %}Dashboard - IRRISS{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <h1 class="text-2xl font-bold text-slate-900 mb-4">欢迎使用 IRRISS Dashboard</h1>
        <p class="text-slate-600">论文线索管理系统</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
            <a href="/batch/monitor" 
               class="block p-4 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors">
                <h3 class="text-lg font-semibold text-blue-900">📊 批处理监控</h3>
                <p class="text-sm text-blue-700 mt-1">查看批处理状态和失败重试</p>
            </a>
            
            <a href="/query/search" 
               class="block p-4 bg-green-50 rounded-lg hover:bg-green-100 transition-colors">
                <h3 class="text-lg font-semibold text-green-900">🔍 DOI 查询</h3>
                <p class="text-sm text-green-700 mt-1">批量查询论文线索信息</p>
            </a>
            
            <a href="/export" 
               class="block p-4 bg-purple-50 rounded-lg hover:bg-purple-100 transition-colors">
                <h3 class="text-lg font-semibold text-purple-900">📥 导入导出</h3>
                <p class="text-sm text-purple-700 mt-1">CSV 数据导入导出</p>
            </a>
            
            <a href="/analysis/stats" 
               class="block p-4 bg-amber-50 rounded-lg hover:bg-amber-100 transition-colors">
                <h3 class="text-lg font-semibold text-amber-900">📈 数据分析</h3>
                <p class="text-sm text-amber-700 mt-1">查看统计图表和趋势</p>
            </a>
            
            <a href="/config" 
               class="block p-4 bg-slate-50 rounded-lg hover:bg-slate-100 transition-colors">
                <h3 class="text-lg font-semibold text-slate-900">⚙️ 配置管理</h3>
                <p class="text-sm text-slate-700 mt-1">关键词和评分规则配置</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
