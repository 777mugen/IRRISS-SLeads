{% extends "base.html" %}

{% block title %}数据分析 - IRRISS{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-slate-900">📈 数据分析</h1>

    <!-- 统计概览 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
            <p class="text-sm font-medium text-slate-600">总论文数</p>
            <p class="text-3xl font-bold text-slate-900 mt-2" id="total-papers">-</p>
        </div>
        
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
            <p class="text-sm font-medium text-slate-600">有效线索数</p>
            <p class="text-3xl font-bold text-green-600 mt-2" id="total-leads">-</p>
        </div>
        
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
            <p class="text-sm font-medium text-slate-600">转化率</p>
            <p class="text-3xl font-bold text-blue-600 mt-2" id="conversion-rate">-</p>
        </div>
    </div>

    <!-- 评分分布图 -->
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">评分分布</h2>
        <div id="score-chart" style="height: 400px;"></div>
    </div>

    <!-- 机构分布 -->
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">机构分布（Top 10）</h2>
        <div id="institution-chart" style="height: 400px;"></div>
    </div>

    <!-- 反馈统计 -->
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">销售反馈统计</h2>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div class="text-center p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600">线索准确性</p>
                <div id="feedback-accuracy" class="mt-2">-</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600">需求匹配度</p>
                <div id="feedback-demand" class="mt-2">-</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600">联系方式有效性</p>
                <div id="feedback-contact" class="mt-2">-</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600">成交速度</p>
                <div id="feedback-speed" class="mt-2">-</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-lg">
                <p class="text-sm text-slate-600">成交价格</p>
                <div id="feedback-price" class="mt-2">-</div>
            </div>
        </div>
    </div>
</div>

<!-- ECharts CDN -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script>
// 页面加载时获取统计数据
document.addEventListener('DOMContentLoaded', function() {
    loadStats();
});

function loadStats() {
    fetch('/api/analysis/stats')
    .then(r => r.json())
    .then(data => {
        // 更新概览数字
        document.getElementById('total-papers').textContent = data.total_papers || 0;
        document.getElementById('total-leads').textContent = data.total_leads || 0;
        document.getElementById('conversion-rate').textContent = 
            data.total_papers > 0 
                ? ((data.total_leads / data.total_papers) * 100).toFixed(1) + '%'
                : '0%';
        
        // 渲染图表
        renderScoreChart(data.score_distribution || {});
        renderInstitutionChart(data.institution_distribution || []);
        renderFeedbackStats(data.feedback_stats || {});
    })
    .catch(err => {
        console.error('Failed to load stats:', err);
    });
}

function renderScoreChart(data) {
    const chart = echarts.init(document.getElementById('score-chart'));
    
    const option = {
        tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
        xAxis: {
            type: 'category',
            data: Object.keys(data),
            name: '评分区间'
        },
        yAxis: {type: 'value', name: '数量'},
        series: [{
            name: '论文数',
            type: 'bar',
            data: Object.values(data),
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    {offset: 0, color: '#3b82f6'},
                    {offset: 1, color: '#60a5fa'}
                ])
            }
        }]
    };
    
    chart.setOption(option);
}

function renderInstitutionChart(data) {
    const chart = echarts.init(document.getElementById('institution-chart'));
    
    const top10 = data.slice(0, 10);
    
    const option = {
        tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
        xAxis: {type: 'value', name: '数量'},
        yAxis: {
            type: 'category',
            data: top10.map(d => d.name).reverse(),
            name: '机构'
        },
        series: [{
            name: '线索数',
            type: 'bar',
            data: top10.map(d => d.count).reverse(),
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                    {offset: 0, color: '#10b981'},
                    {offset: 1, color: '#34d399'}
                ])
            }
        }]
    };
    
    chart.setOption(option);
}

function renderFeedbackStats(stats) {
    const dimensions = ['accuracy', 'demand', 'contact', 'speed', 'price'];
    const labels = {
        accuracy: 'feedback-accuracy',
        demand: 'feedback-demand',
        contact: 'feedback-contact',
        speed: 'feedback-speed',
        price: 'feedback-price'
    };
    
    dimensions.forEach(dim => {
        const stat = stats[dim];
        if (!stat) {
            document.getElementById(labels[dim]).textContent = '暂无数据';
            return;
        }
        
        const html = `
            <div class="text-left">
                <p class="text-green-600">好: ${stat.good || 0}</p>
                <p class="text-yellow-600">中: ${stat.medium || 0}</p>
                <p class="text-red-600">差: ${stat.poor || 0}</p>
            </div>
        `;
        document.getElementById(labels[dim]).innerHTML = html;
    });
}
</script>
{% endblock %}
